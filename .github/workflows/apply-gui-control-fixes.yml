name: Apply GUI control fixes

on:
  push:
    paths:
      - .github/workflows/apply-gui-control-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch source files
        shell: pwsh
        run: |
          $patchScript = @'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  if new in text:
                      return text
                  raise RuntimeError(f"Could not find block: {label}")
              return text.replace(old, new, 1)

          gui_path = Path("Start-RimWorldAiTranslatorGui.ps1")
          gui = gui_path.read_text(encoding="utf-8-sig")

          gui = replace_once(gui,
              '$script:curatedGlossaryPath = ""\n',
              '$script:curatedGlossaryPath = ""\n$script:stopRequested = $false\n',
              'stopRequested state')

          gui = replace_once(gui,
              '''function Get-ApiKeyLines([string]$Text) {
              $keys = New-Object "System.Collections.Generic.List[string]"
              foreach ($line in ($Text -split "\\r?\\n")) {
                  $trim = $line.Trim()
                  if (-not $trim -or $trim.StartsWith("#")) { continue }
                  [void]$keys.Add($trim)
              }
              return ,$keys
          }
          '''.replace('          ', ''),
              '''function Get-ApiKeyLines([string]$Text) {
              $keys = New-Object "System.Collections.Generic.List[string]"
              foreach ($line in ([System.Text.RegularExpressions.Regex]::Split($Text, "\\r\\n|\\n|\\r"))) {
                  $trim = $line.Trim()
                  if (-not $trim -or $trim.StartsWith("#")) { continue }

                  if ($trim -match "^\\s*([A-Za-z_][A-Za-z0-9_]*)\\s*=\\s*(.+)\\s*$") {
                      $trim = $matches[2].Trim()
                  }
                  $trim = $trim.Trim('"').Trim("'")
                  if ($trim.StartsWith("Bearer ", [System.StringComparison]::OrdinalIgnoreCase)) {
                      $trim = $trim.Substring(7).Trim()
                  }

                  foreach ($part in ($trim -split "[,;]")) {
                      $key = $part.Trim().Trim('"').Trim("'")
                      if ($key) { [void]$keys.Add($key) }
                  }
              }
              return $keys.ToArray()
          }
          '''.replace('          ', ''),
              'api key parser')

          gui = replace_once(gui,
              '''function Add-Log([string]$Text) {
          '''.replace('          ', ''),
              '''function Stop-ProcessTree([int]$ProcessId) {
              if ($ProcessId -le 0) { return }

              $children = @()
              try {
                  $children = @(Get-CimInstance Win32_Process -Filter "ParentProcessId = $ProcessId" -ErrorAction SilentlyContinue)
              } catch {
                  $children = @()
              }

              foreach ($child in $children) {
                  Stop-ProcessTree ([int]$child.ProcessId)
              }

              try {
                  $proc = Get-Process -Id $ProcessId -ErrorAction SilentlyContinue
                  if ($proc -and -not $proc.HasExited) {
                      Stop-Process -Id $ProcessId -Force -ErrorAction Stop
                  }
              } catch {
              }
          }

          function Add-Log([string]$Text) {
          '''.replace('          ', ''),
              'process tree stopper')

          gui = gui.replace('return ,$lines', 'return $lines.ToArray()')

          gui = replace_once(gui,
              '$script:processExitHandled = $false\n\n    try {',
              '$script:processExitHandled = $false\n    $script:stopRequested = $false\n\n    try {',
              'reset stop state')

          gui = replace_once(gui,
              '''function Stop-Translation {
              if ($script:process -and -not $script:process.HasExited) {
                  try {
                      $script:process.Kill()
                      Add-Log "사용자 요청으로 실행을 중지했습니다."
                  } catch {
                      Add-Log "중지 실패: $($_.Exception.Message)"
                  }
              }
          }
          '''.replace('          ', ''),
              '''function Stop-Translation {
              if ($script:process -and -not $script:process.HasExited) {
                  try {
                      $script:stopRequested = $true
                      $btnStop.Enabled = $false
                      $lblStatus.Text = "중지 요청 중"
                      Add-Log "사용자 요청으로 실행 중지를 요청했습니다."
                      Stop-ProcessTree $script:process.Id
                  } catch {
                      Add-Log "중지 실패: $($_.Exception.Message)"
                  }
              }
          }
          '''.replace('          ', ''),
              'stop translation')

          gui = replace_once(gui,
              '''        if ($exitCode -eq 0) {
                      if ($progress.Maximum -gt 0) { $progress.Value = $progress.Maximum }
                      $lblStatus.Text = "완료"
                  } else {
                      $lblStatus.Text = "종료 코드 $exitCode"
                  }
                  try { $script:process.Dispose() } catch {}
                  Set-RunningState $false
          '''.replace('          ', ''),
              '''        if ($script:stopRequested) {
                      $lblStatus.Text = "중지됨"
                      Add-Log "사용자 요청으로 중지 완료."
                  } elseif ($exitCode -eq 0) {
                      if ($progress.Maximum -gt 0) { $progress.Value = $progress.Maximum }
                      $lblStatus.Text = "완료"
                  } else {
                      $lblStatus.Text = "종료 코드 $exitCode"
                  }
                  try { $script:process.Dispose() } catch {}
                  $script:stopRequested = $false
                  Set-RunningState $false
          '''.replace('          ', ''),
              'exit handling')

          gui = replace_once(gui,
              '        try { $script:process.Kill() } catch {}',
              '        try { Stop-ProcessTree $script:process.Id } catch {}',
              'form closing kill')

          gui_path.write_text(gui, encoding="utf-8-sig", newline="\n")

          invoke_path = Path("Invoke-RimWorldAiTranslation.ps1")
          invoke = invoke_path.read_text(encoding="utf-8")
          invoke = replace_once(invoke, '    return ,$unique\n}', '    return $unique.ToArray()\n}', 'api key return')
          invoke = replace_once(invoke, '    return ,$states\n}', '    return $states.ToArray()\n}', 'key state return')
          invoke_path.write_text(invoke, encoding="utf-8", newline="\n")

          notes_path = Path("RELEASE_NOTES.md")
          notes = notes_path.read_text(encoding="utf-8")
          old_notes = '''# Unreleased

## Documentation

- Clarified that normal users enter Cerebras API keys directly in the GUI, one key per line, and do not need key files.
- Documented that DLL/C# hardcoded runtime inspect strings, gizmo labels, and status text may require source changes or Harmony patches when the mod does not use RimWorld translation keys.
'''
          new_notes = '''# RimWorld AI Translator v0.1.2

## Fixes

- Fixed GUI API key parsing so multiple keys entered on separate lines are counted and passed to the translator correctly.
- Fixed the Stop button so it terminates the translator process tree instead of only killing the intermediate command wrapper.

## Documentation

- Clarified that normal users enter Cerebras API keys directly in the GUI, one key per line, and do not need key files.
- Documented that DLL/C# hardcoded runtime inspect strings, gizmo labels, and status text may require source changes or Harmony patches when the mod does not use RimWorld translation keys.
'''
          notes = replace_once(notes, old_notes, new_notes, 'release notes')
          notes_path.write_text(notes, encoding="utf-8", newline="\n")
          '@
          Set-Content -Path patch_gui_controls.py -Value $patchScript -Encoding UTF8
          python patch_gui_controls.py

      - name: Validate fixes
        shell: pwsh
        run: |
          $files = @('Start-RimWorldAiTranslatorGui.ps1','Invoke-RimWorldAiTranslation.ps1','build-package.ps1')
          foreach ($f in $files) {
            $null = [scriptblock]::Create((Get-Content -LiteralPath $f -Encoding UTF8 -Raw))
            "OK $f"
          }

          $src = Get-Content -LiteralPath 'Start-RimWorldAiTranslatorGui.ps1' -Encoding UTF8 -Raw
          $m = [regex]::Match($src, 'function Get-ApiKeyLines\([\s\S]*?\r?\n}\r?\n\r?\nfunction New-TempFilePath')
          if (-not $m.Success) { throw 'Get-ApiKeyLines not found' }
          $func = $m.Value -replace '\r?\nfunction New-TempFilePath[\s\S]*$',''
          Invoke-Expression $func
          $parsed = @(Get-ApiKeyLines "csk-one`r`ncsk-two")
          if ($parsed.Count -ne 2) { throw "Expected 2 GUI API keys, got $($parsed.Count)" }

          $src = Get-Content -LiteralPath 'Start-RimWorldAiTranslatorGui.ps1' -Encoding UTF8 -Raw
          $m = [regex]::Match($src, 'function Stop-ProcessTree\([\s\S]*?\r?\n}\r?\n\r?\nfunction Add-Log')
          if (-not $m.Success) { throw 'Stop-ProcessTree not found' }
          $func = $m.Value -replace '\r?\nfunction Add-Log[\s\S]*$',''
          Invoke-Expression $func
          $p = Start-Process -FilePath 'cmd.exe' -ArgumentList @('/d','/s','/c','powershell -NoProfile -Command "Start-Sleep -Seconds 60"') -WindowStyle Hidden -PassThru
          Start-Sleep -Milliseconds 800
          Stop-ProcessTree $p.Id
          Start-Sleep -Milliseconds 800
          if (Get-Process -Id $p.Id -ErrorAction SilentlyContinue) { throw 'Process tree parent still alive' }

          $env:RIMWORLD_TRANSLATOR_API_KEYS = "csk-one`ncsk-two"
          $out = powershell -NoProfile -ExecutionPolicy Bypass -File '.\Invoke-RimWorldAiTranslation.ps1' -ModRoot '.\testdata\SampleMod' -DryRun -Limit 1 | Out-String
          Remove-Item Env:\RIMWORLD_TRANSLATOR_API_KEYS -ErrorAction SilentlyContinue
          $out
          if ($out -notmatch 'API keys loaded: 2') { throw 'Translator did not load 2 API keys' }

      - name: Build package
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File '.\build-package.ps1'

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          Remove-Item -LiteralPath '.github/workflows/apply-gui-control-fixes.yml' -Force
          git add Start-RimWorldAiTranslatorGui.ps1 Invoke-RimWorldAiTranslation.ps1 RELEASE_NOTES.md .github/workflows/apply-gui-control-fixes.yml
          git commit -m 'Fix GUI API key parsing and stop button'
          git push

      - name: Create v0.1.2 release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @'
          ## Fixes

          - Fixed GUI API key parsing so multiple keys entered on separate lines are counted and passed to the translator correctly.
          - Fixed the Stop button so it terminates the translator process tree instead of only killing the intermediate command wrapper.
          - Includes the v0.1.1 API key file removal behavior: normal users enter keys directly in the GUI.
          '@
          Set-Content -Path release-v0.1.2.md -Value $notes -Encoding UTF8
          gh release create v0.1.2 '.\dist\RimWorldAiTranslator.zip' --title 'RimWorld AI Translator v0.1.2' --notes-file release-v0.1.2.md
